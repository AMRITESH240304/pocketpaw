name: pocketpaw-scanner Wheels

on:
  pull_request:
    branches: [dev, main]
    paths:
      - "pocketpaw-scanner/**"
      - ".github/workflows/pocketpaw-scanner-wheels.yml"
  push:
    branches: [dev]
    paths:
      - "pocketpaw-scanner/**"
      - ".github/workflows/pocketpaw-scanner-wheels.yml"
  workflow_dispatch:

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.os }} / ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: windows-x86_64
          - os: macos-13
            target: x86_64-apple-darwin
            artifact_name: macos-x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            artifact_name: macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheels with maturin
        uses: PyO3/maturin-action@v1
        with:
          working-directory: pocketpaw-scanner
          manylinux: auto
          target: ${{ matrix.target }}
          args: --release --out dist

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: pocketpaw-scanner-${{ matrix.artifact_name }}
          path: pocketpaw-scanner/dist

  smoke-install:
    name: Smoke install built wheels
    runs-on: ubuntu-latest
    needs: build-wheels

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download Linux wheels
        uses: actions/download-artifact@v4
        with:
          name: pocketpaw-scanner-linux-x86_64
          path: dist

      - name: Install wheel and import
        run: |
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python - << 'PY'
          import pocketpaw_scanner
          print("scanner import OK", pocketpaw_scanner.__all__)
          PY
